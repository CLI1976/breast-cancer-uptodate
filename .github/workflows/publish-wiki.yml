name: Publish Reports to Wiki

on:
  push:
    branches: [main]
    paths:
      - "reports/**/**.md"

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed report files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(find reports -name "*.md" | sort)
          else
            files=$(git diff --name-only HEAD~1 HEAD -- "reports/**/*.md" | sort)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed: $files"

      - name: Setup wiki directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Cloned existing wiki."
          else
            echo ""
            echo "============================================================"
            echo "  Wiki not initialized yet."
            echo "  One-time setup required:"
            echo "  1. Go to: https://github.com/${{ github.repository }}/wiki"
            echo "  2. Click 'Create the first page', save anything."
            echo "  3. Re-run this workflow — it will work automatically."
            echo "============================================================"
            exit 1
          fi

          git -C wiki config user.name  "github-actions[bot]"
          git -C wiki config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Copy reports and rebuild index
        run: |
          changed_files="${{ steps.changed.outputs.files }}"
          if [ -z "$changed_files" ]; then
            echo "No changed files — skipping."
            exit 0
          fi

          # Copy reports preserving cancer type in filename: breast/2026-W16.md → breast-2026-W16.md
          for f in $changed_files; do
            [ -f "$f" ] || continue
            # Extract cancer type and filename from path like reports/lung/2026-W17.md
            cancer=$(echo "$f" | sed 's|reports/\([^/]*\)/.*|\1|')
            base=$(basename "$f")
            wiki_name="${cancer}-${base}"
            cp "$f" "wiki/${wiki_name}"
            echo "Copied $f → wiki/${wiki_name}"
          done

          # Cancer type labels for index
          declare -A LABELS=(
            [breast]="乳癌治療趨勢週報"
            [lung]="肺癌治療趨勢週報"
            [colorectal]="大腸直腸癌治療趨勢週報"
          )

          # Rebuild Home.md index grouped by cancer type
          {
            echo "# 腫瘤治療趨勢週報"
            echo ""
            echo "> 每週自動生成 · 資料來源：OpenEvidence、OncDaily、OncLive、ESMO、ClinicalTrials.gov"
            echo ""

            for cancer_dir in $(ls -d reports/*/ 2>/dev/null | sort); do
              cancer=$(basename "$cancer_dir")
              label="${LABELS[$cancer]:-${cancer} 週報}"
              echo "## ${label}"
              echo ""
              echo "| 週次 | 連結 |"
              echo "|------|------|"
              for md in $(ls wiki/${cancer}-[0-9][0-9][0-9][0-9]-W[0-9][0-9].md 2>/dev/null | sort -r); do
                page="$(basename "${md%.md}")"
                week="${page#${cancer}-}"
                echo "| ${week} | [[${page}]] |"
              done
              echo ""
            done
          } > wiki/Home.md

      - name: Commit and push wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git -C wiki add -A
          if git -C wiki diff --cached --quiet; then
            echo "Wiki already up-to-date."
          else
            git -C wiki commit -m "wiki: $(date -u +%Y-%m-%d) — publish reports [skip ci]"
            git -C wiki push "$WIKI_URL" HEAD:master --force
          fi
